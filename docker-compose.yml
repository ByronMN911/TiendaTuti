# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tuti_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend_tuti # Cambiar esto a la carpeta de Django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata datos_iniciales.json &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=tuti_db
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

  frontend:
    build: ./frontend # Cambia esto a tu carpeta de Angular
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: