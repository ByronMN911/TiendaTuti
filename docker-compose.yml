# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tuti_db
      POSTGRES_USER: postgres      # 🟢 Cambiado para coincidir con tu .env
      POSTGRES_PASSWORD: "0607"    # 🟢 Cambiado para coincidir con tu .env (usa comillas por seguridad)
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend_tuti
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata datos_iniciales.json &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      # 🟢 ACTUALIZADO: Ahora la URL de conexión usa tus datos reales
      - DATABASE_URL=postgres://postgres:0607@db:5432/tuti_db
    depends_on:
      - db

  frontend:
    build: ./frontend # Cambia esto a tu carpeta de Angular
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: