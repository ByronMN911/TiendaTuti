<div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
  <h1>Proyecto Calidad de Software</h1>
  <p>Estudiante: Byron</p>
  <hr>

  <div *ngIf="respuesta; else cargando">
    <div style="background-color: #d4edda; padding: 20px; border-radius: 10px; display: inline-block;">
      <h3>Mensaje desde Django:</h3>
      <p style="font-size: 1.5rem; color: #155724;">{{ respuesta.mensaje }}</p>
    </div>
  </div>

  <ng-template #cargando>
    <p>Intentando conectar con el Backend en el puerto 8000...</p>
  </ng-template>
</div>
