    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055; margin-top: 70px;">
      
      @for (toast of toastService.toasts(); track toast.id) {
        <div class="toast show align-items-center text-white border-0 mb-2 shadow"
             [ngClass]="{'bg-success': toast.tipo === 'success', 'bg-danger': toast.tipo === 'error'}">
          <div class="d-flex">
            <div class="toast-body fw-bold">
              @if (toast.tipo === 'success') { <i class="bi bi-check-circle-fill me-2"></i> }
              @if (toast.tipo === 'error') { <i class="bi bi-exclamation-triangle-fill me-2"></i> }
              {{ toast.mensaje }}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastService.remove(toast.id)"></button>
          </div>
        </div>
      }
      
    </div>
